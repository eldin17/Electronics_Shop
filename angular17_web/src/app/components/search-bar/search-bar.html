<div class="search-bar">
  <input
    type="text"
    placeholder="Search products, brands and more..."
    [(ngModel)]="query"
    (keyup.enter)="onSearch()"
  />

  @if (query) {
    <button class="clear-btn" (click)="onClear()" title="Clear">✕</button>
  }

  <button class="search-btn" (click)="onSearch()" title="Search">🔍</button>
</div>
