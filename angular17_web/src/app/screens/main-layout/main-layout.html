<header class="top-header">
  <div class="header-row">
    <a routerLink="/home" class="logo">ElectronicShop17</a>

    <app-search-bar class="header-search"></app-search-bar>

    <div class="header-actions">

      <div class="notif-wrapper" #notifWrapper>
        <button (click)="toggleNotifMenu()" title="Notifications" [class.active]="isNotifMenuOpen">
          🔔
          <span class="badge">1</span>
        </button>

        @if (isNotifMenuOpen) {
          <div class="notif-dropdown">
            <div class="notif-content">
              <div class="notif-header">Notifications</div>
              <div class="notif-empty">
                <span class="empty-icon">🔔</span>
                <p>Nothing here yet</p>
              </div>
            </div>
          </div>
        }
      </div>


      <button (click)="goToCart()" title="Cart">🛒</button>

      <div class="profile-wrapper" #profileWrapper>
        <button (click)="toggleProfileMenu()" title="Account" [class.active]="isProfileMenuOpen">👤</button>

        @if (isProfileMenuOpen) {
          <div class="profile-dropdown">
            <button (click)="onProfileOption('My Orders')">
              <span class="icon">📦</span> My Orders
            </button>
            <button (click)="onProfileOption('Wishlist')">
              <span class="icon">❤️</span> Wishlist
            </button>
            <button (click)="onProfileOption('Settings')">
              <span class="icon">⚙️</span> Settings
            </button>
            <button (click)="onProfileOption('Addresses')">
              <span class="icon">📍</span> Addresses
            </button>

            <div class="dropdown-divider"></div>

            <button (click)="logout()" class="logout-btn">
               Log Out
            </button>
          </div>
        }
      </div>

    </div>
  </div>

  <nav class="nav-row">
    <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a routerLink="/categories" routerLinkActive="active">Categories</a>
    <a routerLink="/deals" routerLinkActive="active">Deals</a>
    <a routerLink="/new-arrivals" routerLinkActive="active">New Arrivals</a>
  </nav>
</header>

<main class="page-content">
  <router-outlet></router-outlet>
</main>

<footer class="site-footer">
  <p>&copy; ElectronicShop17.</p>
</footer>
